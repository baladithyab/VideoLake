[tool:pytest]
markers =
    real_aws: marks tests as requiring real AWS services (deselect with '-m "not real_aws"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    video: marks tests as video processing tests
    embedding: marks tests as embedding generation tests
    storage: marks tests as storage operation tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

filterwarnings =
    ignore::DeprecationWarning:tests.*
    ignore::PytestUnknownMarkWarning