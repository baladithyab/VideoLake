# Testing Configuration Overrides
# These settings override the default configuration for testing environment

environment: testing
debug: true
log_level: INFO
host: localhost
port: 8502

# AWS Configuration for Testing
aws:
  region: us-east-1
  s3_bucket: s3vector-test-bucket
  s3_prefix: test/

# Feature Flags for Testing
features:
  enable_real_aws: false  # Always use simulation in testing
  enable_opensearch_hybrid: true
  enable_video_upload: true
  enable_cost_estimation: true
  enable_performance_monitoring: true
  enable_error_dashboard: true
  enable_advanced_visualization: true
  enable_multi_vector_processing: true
  enable_query_auto_detection: true
  enable_segment_navigation: true

# Performance Configuration for Testing
performance:
  max_concurrent_jobs: 4
  request_timeout: 10
  max_retries: 2
  cache_ttl: 60    # 1 minute for fast testing
  max_memory_usage: 2048  # 2GB
  enable_caching: false   # Disable caching for consistent testing
  enable_compression: false

# Security Configuration for Testing
security:
  enable_https: false
  session_timeout: 7200  # 2 hours for long test sessions
  max_upload_size: 100    # 100MB
  enable_cors: true
  enable_xsrf_protection: false
