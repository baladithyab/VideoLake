# Videolake Configuration
# This file contains default configuration settings that can be overridden
# by environment variables or environment-specific config files.

# Application settings
environment: development  # development, staging, production, testing
debug: true
log_level: INFO
host: localhost
port: 8501

# AWS Configuration
aws:
  region: us-east-1
  s3_bucket: videolake-production-bucket
  s3_vectors_bucket: videolake-production-bucket
  s3_prefix: vectors/
  bedrock_model_id: amazon.titan-embed-text-v1
  bedrock_max_tokens: 8192

# Embedding Model Selection
# Choose between "marengo" (multi-vector) or "nova" (unified single-vector)
embedding:
  default_model: marengo  # "marengo" or "nova"

# Marengo 2.7 Configuration (Multi-Vector Approach)
# Choose access method: "bedrock" (recommended) or "twelvelabs_api"
# Marengo generates SEPARATE embeddings per modality (user-selectable)
marengo:
  access_method: bedrock  # "bedrock" or "twelvelabs_api"

  # Bedrock access configuration (recommended)
  bedrock_model_id: twelvelabs.marengo-embed-2-7-v1:0
  bedrock_region: us-east-1  # us-east-1, eu-west-1, ap-northeast-2

  # TwelveLabs API access configuration (alternative)
  twelvelabs_api_url: https://api.twelvelabs.io
  twelvelabs_model_name: marengo2.7

  # Common processing settings
  max_video_duration: 3600  # seconds
  segment_duration: 5.0     # seconds

  # User-selectable vector types (can choose which embeddings to generate)
  default_vector_types:
    - visual-text
    - visual-image
    - audio
  supported_vector_types:
    - visual-text
    - visual-image
    - audio

# Amazon Nova Configuration (Unified Single-Vector Approach)
# Nova generates a SINGLE unified embedding across all modalities
nova:
  model_id: amazon.nova-2-multimodal-embeddings-v1:0
  region: us-east-1  # Currently only available in us-east-1

  # Embedding configuration
  default_dimension: 1024  # Options: 3072, 1024, 384, 256
  embedding_purpose: GENERIC_INDEX  # GENERIC_INDEX, RETRIEVAL, CLASSIFICATION, CLUSTERING

  # Video processing settings
  default_embedding_mode: AUDIO_VIDEO_COMBINED  # AUDIO_VIDEO_COMBINED, AUDIO_ONLY, VIDEO_ONLY
  max_video_duration: 3600  # seconds
  segment_duration: 15.0    # seconds (for segmented embeddings)
  use_async_for_long_videos: true  # Use async API for videos > 30s

# Legacy TwelveLabs Configuration (for backward compatibility)
twelvelabs:
  api_url: https://api.twelvelabs.io
  model_name: marengo2.7
  max_video_duration: 3600  # seconds
  segment_duration: 5.0     # seconds

# OpenSearch Configuration
opensearch:
  index_prefix: videolake
  max_results: 100

# Feature Flags
features:
  enable_real_aws: true
  enable_demo_data: false
  enable_opensearch_hybrid: true
  enable_video_upload: true
  enable_cost_estimation: true
  enable_performance_monitoring: true
  enable_error_dashboard: true
  enable_advanced_visualization: true
  enable_multi_vector_processing: true
  enable_query_auto_detection: true
  enable_segment_navigation: true

# UI Configuration
ui:
  app_title: "Videolake"
  app_icon: "🔍"
  page_layout: wide
  sidebar_state: expanded
  theme: light
  
  workflow_sections:
    - "Upload & Processing"
    - "Query & Search"
    - "Results & Playback"
    - "Embedding Visualization"
    - "Analytics & Management"
  
  default_vector_types:
    - visual-text
    - visual-image
    - audio
  
  default_storage_patterns:
    - direct_s3vector
    - opensearch_s3vector_hybrid
  
  default_processing_mode: parallel
  default_segment_duration: 5.0

# Performance Configuration
performance:
  max_concurrent_jobs: 8
  request_timeout: 30
  max_retries: 3
  cache_ttl: 3600  # seconds
  max_memory_usage: 4096  # MB
  enable_caching: true
  enable_compression: true

# Security Configuration
security:
  enable_https: false  # Set to true in production
  session_timeout: 3600  # seconds
  max_upload_size: 500   # MB
  allowed_file_types:
    - .mp4
    - .avi
    - .mov
    - .mkv
    - .webm
  enable_cors: true      # Set to false in production
  enable_xsrf_protection: false  # Set to true in production

# Environment-specific overrides can be placed in separate files:
# - config.development.yaml
# - config.staging.yaml  
# - config.production.yaml
# - config.testing.yaml
