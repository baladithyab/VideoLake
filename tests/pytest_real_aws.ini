[tool:pytest]
# Configuration for real AWS integration tests

# Test discovery
testpaths = tests
python_files = test_real_aws_*.py
python_functions = test_*
python_classes = Test*

# Markers for test categorization
markers =
    real_aws: Tests that use real AWS services (may incur costs)
    slow: Tests that take a long time to run
    integration: Integration tests
    unit: Unit tests
    cleanup: Tests that clean up resources

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Timeout for long-running tests (30 minutes)
timeout = 1800

# Parallel execution (be careful with real AWS resources)
# addopts = -n auto  # Uncomment to run tests in parallel

[pytest-timeout]
# Method to use for timeout (thread or signal)
method = thread