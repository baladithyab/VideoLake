[pytest]
# Pytest configuration for S3Vector test suite

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.11

# Add current directory to Python path
pythonpath = .

# Test markers for selective test execution
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require local services)
    e2e: End-to-end tests (full pipeline tests)
    terraform: Terraform validation tests
    requires_aws: Tests that require AWS credentials
    slow: Tests that take a long time to run

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */node_modules/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
